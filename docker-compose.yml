services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: email_os
      POSTGRES_PASSWORD: password
      POSTGRES_DB: email_os
    ports:
      - "5432:5432"
    volumes:
      - email_os_pgdata:/var/lib/postgresql/data

volumes:
  email_os_pgdata:
